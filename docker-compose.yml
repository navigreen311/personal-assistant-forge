# docker-compose.yml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paf-app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - DATABASE_URL=postgresql://paf_user:paf_password@postgres:5432/paf_dev
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-dev-secret-change-in-production}
      - NEXTAUTH_URL=http://localhost:3000
      - NODE_ENV=production
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - paf-network

  init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: paf-init
    command: npx -y prisma@6.19.2 migrate deploy
    environment:
      - DATABASE_URL=postgresql://paf_user:paf_password@postgres:5432/paf_dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - paf-network
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: paf-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: paf_user
      POSTGRES_PASSWORD: paf_password
      POSTGRES_DB: paf_dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paf_user -d paf_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - paf-network

  redis:
    image: redis:7-alpine
    container_name: paf-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - paf-network

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  paf-network:
    driver: bridge
